services:
  seq-otel-mcp:
    image: mcp/seq-otel:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_VERSION: latest
    stdin_open: true
    tty: false
    environment:
      SEQ_URL: ${SEQ_URL:?SEQ_URL is required}
      SEQ_API_KEY: ${SEQ_API_KEY:?SEQ_API_KEY is required}
